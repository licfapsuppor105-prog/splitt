<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Intro</title>
<style>
  body { margin:0; overflow:hidden; background:black; }
  video {
    width:100vw;
    height:100vh;
    object-fit:cover;
  }
</style>
</head>
<body>

<video id="intro" autoplay muted>
  <source src="videointro.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("intro");

// activer le son dès interaction
function unmute(){
  video.muted = false;
  video.play();
}

document.addEventListener("click", unmute, {once:true});
document.addEventListener("mousemove", unmute, {once:true});
document.addEventListener("keydown", unmute, {once:true});

// redirection après 22 secondes
setTimeout(()=>{
  window.location.href = "https://licfapsuppor105-prog.github.io/splitt/menu";
},22000);
</script>

</body>
</html>
