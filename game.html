<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Monde 1</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
    #popup {
      position:absolute;
      top:40%; left:50%; transform:translate(-50%, -50%);
      background:rgba(0,0,0,0.8);
      color:white; padding:20px 40px;
      font-size:32px; font-family:monospace;
      border:2px solid white;
    }
  </style>
</head>
<body>
<div id="popup">Monde 1</div>
<audio id="music" src="sonBien (1).mp3" autoplay loop></audio>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Remove popup after 2 seconds
setTimeout(()=>{
  document.getElementById("popup").style.display = "none";
},2000);

let player = { x:200, y:200, speed:3, crouch:false };
let keys = {};

let bots = [];
for(let i=0;i<5;i++){
  bots.push({ x:Math.random()*800+100, y:Math.random()*500+100 });
}

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

function update(){
  if(keys['z'] || keys['arrowup']) player.y -= player.speed;
  if(keys['s'] || keys['arrowdown']) player.y += player.speed;
  if(keys['q'] || keys['arrowleft']) player.x -= player.speed;
  if(keys['d'] || keys['arrowright']) player.x += player.speed;

  player.crouch = keys['c'];
}

function drawWeapon(){
  ctx.fillStyle = "gray";
  ctx.fillRect(canvas.width/2 - 20, canvas.height - 80, 40, 60);
}

function drawBots(){
  bots.forEach(bot=>{
    ctx.fillStyle = "red";
    ctx.fillRect(bot.x, bot.y, 20, 40);

    // shooting line
    ctx.strokeStyle = "yellow";
    ctx.beginPath();
    ctx.moveTo(bot.x+10, bot.y+20);
    ctx.lineTo(player.x, player.y);
    ctx.stroke();
  });
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  update();

  drawBots();
  drawWeapon();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
