<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Splitt</title>
<style>
  body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center, #001a00, #000);
    font-family:monospace;
    color:white;
  }

  .menu {
    text-align:center;
  }

  h1 {
    font-size:70px;
    margin-bottom:60px;
    text-shadow:0 0 20px #0f0, 0 0 40px #0f0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:25px;
  }

  h1 img{
    height:140px;
    width:auto;
    object-fit:contain;
    mix-blend-mode: lighten;
  }

  .btn {
    display:block;
    margin:20px auto;
    padding:20px 80px;
    font-size:28px;
    border:none;
    cursor:pointer;
    border-radius:12px;
    background:linear-gradient(45deg,#00ff99,#00cc66);
    color:black;
    box-shadow:0 0 20px #00ff99;
    transition:0.3s;
    text-decoration:none;
  }

  .btn:hover {
    transform:scale(1.1);
    box-shadow:0 0 40px #00ff99;
  }
</style>
</head>
<body>

<audio id="music" src="Meni.mp3" autoplay muted loop></audio>

<div class="menu">
  <h1>
    <img src="Splitt.jpg" alt="logo">
    SPLITT
  </h1>

  <a class="btn" href="https://licfapsuppor105-prog.github.io/splitt/game.html">
    Jouer
  </a>

  <a class="btn" href="https://licfapsuppor105-prog.github.io/splitt/credits.html">
    Crédits
  </a>
</div>

<script>
const music = document.getElementById("music");

// lancer en muted (autorisé)
music.play().catch(()=>{});

function unlockAudio(){
  music.muted = false;
  music.volume = 1;
  music.play().catch(()=>{});
}

// IMPORTANT: déclenche AVANT redirection
window.addEventListener("mousedown", unlockAudio);
window.addEventListener("keydown", unlockAudio);
window.addEventListener("mousemove", unlockAudio);
</script>

</body>
</html>
